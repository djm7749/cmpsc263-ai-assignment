<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draggable Snowy Dice</title>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(to bottom, #1e3c72 0%, #2a5298 100%); cursor: grab; }
        body:active { cursor: grabbing; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. Scene & Camera ---
        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const d = 5; 
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- 3. Floor & Snow ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 4), new THREE.MeshLambertMaterial({ color: 0xadd8e6 }));
        floor.position.y = -4.8; 
        scene.add(floor);

        const snowCount = 1000;
        const snowGeo = new THREE.BufferGeometry();
        const snowPos = new Float32Array(snowCount * 3);
        for (let i = 0; i < snowCount * 3; i += 3) {
            snowPos[i] = (Math.random() - 0.5) * 25; 
            snowPos[i+1] = (Math.random() - 0.5) * 15;
            snowPos[i+2] = (Math.random() - 0.5) * 10;
        }
        snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
        const snowPoints = new THREE.Points(snowGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 }));
        scene.add(snowPoints);

        // --- 4. Pip Dice ---
        function createDiceFace(pips) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fefefe'; ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#2a5298'; ctx.lineWidth = 12; ctx.strokeRect(0, 0, 128, 128);
            ctx.fillStyle = '#222';
            const r = 12, m = 32, c = 64, p = 96;
            const dots = { 1:[[c,c]], 2:[[m,m],[p,p]], 3:[[m,m],[c,c],[p,p]], 4:[[m,m],[p,m],[m,p],[p,p]], 5:[[m,m],[p,m],[c,c],[m,p],[p,p]], 6:[[m,m],[p,m],[m,c],[p,c],[m,p],[p,p]] };
            dots[pips].forEach(pos => { ctx.beginPath(); ctx.arc(pos[0], pos[1], r, 0, Math.PI*2); ctx.fill(); });
            return new THREE.CanvasTexture(canvas);
        }
        const materials = [1, 6, 2, 5, 3, 4].map(n => new THREE.MeshLambertMaterial({ map: createDiceFace(n) }));
        const dice = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), materials);
        scene.add(dice);

        // --- 5. Physics & Interaction Variables ---
        let px = 0, py = 0, vx = 0.1, vy = 0.1, rx = 0.05, ry = 0.05;
        const gravity = -0.006, bounce = 0.92;
        let bounds = {};
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let lastMousePos = new THREE.Vector3();

        function updateBounds() {
            const aspect = window.innerWidth / window.innerHeight;
            bounds = { r: (d * aspect) - 0.5, l: (-d * aspect) + 0.5, t: d - 0.5, b: -d + 0.5 };
        }
        updateBounds();

        // --- 6. Input Handling ---
        function onPointerDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(dice);
            if (intersects.length > 0) {
                isDragging = true;
                vx = 0; vy = 0; // Stop movement while holding
            }
        }

        function onPointerMove(event) {
            if (!isDragging) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Map mouse to world coordinates
            const vector = new THREE.Vector3(mouse.x, mouse.y, 0).unproject(camera);
            
            // Calculate velocity based on movement delta
            vx = (vector.x - dice.position.x) * 0.6;
            vy = (vector.y - dice.position.y) * 0.6;
            
            dice.position.x = vector.x;
            dice.position.y = vector.y;
            px = dice.position.x;
            py = dice.position.y;

            // Add some "jiggle" rotation while dragging
            dice.rotation.x += vx;
            dice.rotation.y += vy;
        }

        function onPointerUp() { isDragging = false; }

        window.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);

        // --- 7. Animation ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isDragging) {
                vy += gravity;
                px += vx; py += vy;

                // Wall Collisions
                if (px > bounds.r || px < bounds.l) {
                    vx *= -bounce; px = (px > bounds.r) ? bounds.r : bounds.l;
                    rx = (Math.random() - 0.5) * 0.3;
                }
                if (py > bounds.t || py < bounds.b) {
                    vy *= -bounce; py = (py > bounds.t) ? bounds.t : bounds.b;
                    ry = (Math.random() - 0.5) * 0.3;
                }

                dice.position.set(px, py, 0);
                dice.rotation.x += rx;
                dice.rotation.y += ry;
            }

            // Snow Animation
            const p = snowPoints.geometry.attributes.position.array;
            for (let i = 1; i < p.length; i += 3) {
                p[i] -= 0.02; if (p[i] < -5) p[i] = 5;
            }
            snowPoints.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect; camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateBounds();
        });

        animate();
    </script>
</body>
</html>
