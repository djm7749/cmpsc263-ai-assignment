<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Drag Snowy Dice with Stop</title>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(to bottom, #1e3c72 0%, #2a5298 100%); cursor: crosshair; }
        body:active { cursor: grabbing; }
        
        #controls {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none; /* Allows clicking through the container */
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #1e3c72;
            background: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto; /* Enables clicking the button itself */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #add8e6;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="stopBtn">Stop Dice</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. Scene & Camera ---
        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const d = 5; 
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. Environment ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 4), new THREE.MeshLambertMaterial({ color: 0xadd8e6 }));
        floor.position.y = -4.8; 
        scene.add(floor);

        // Snow
        const snowCount = 1000;
        const snowGeo = new THREE.BufferGeometry();
        const snowPos = new Float32Array(snowCount * 3);
        for (let i = 0; i < snowCount * 3; i += 3) {
            snowPos[i] = (Math.random() - 0.5) * 25; 
            snowPos[i+1] = (Math.random() - 0.5) * 15;
            snowPos[i+2] = (Math.random() - 0.5) * 10;
        }
        snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
        const snowPoints = new THREE.Points(snowGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 }));
        scene.add(snowPoints);

        // --- 3. Pip Dice ---
        function createDiceFace(pips) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#2a5298'; ctx.lineWidth = 12; ctx.strokeRect(0, 0, 128, 128);
            ctx.fillStyle = '#111';
            const r = 12, m = 32, c = 64, p = 96;
            const dots = { 1:[[c,c]], 2:[[m,m],[p,p]], 3:[[m,m],[c,c],[p,p]], 4:[[m,m],[p,m],[m,p],[p,p]], 5:[[m,m],[p,m],[c,c],[m,p],[p,p]], 6:[[m,m],[p,m],[m,c],[p,c],[m,p],[p,p]] };
            dots[pips].forEach(pos => { ctx.beginPath(); ctx.arc(pos[0], pos[1], r, 0, Math.PI*2); ctx.fill(); });
            return new THREE.CanvasTexture(canvas);
        }
        // Face order: +x, -x, +y, -y, +z, -z
        const dice = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), [1, 2, 3, 4, 5, 6].map(n => new THREE.MeshLambertMaterial({ map: createDiceFace(n) })));
        scene.add(dice);

        // --- 4. Physics & State ---
        let px = 0, py = 0, vx = 0.1, vy = 0.1, rx = 0.05, ry = 0.05;
        const gravity = -0.006, bounce = 0.94;
        let isDragging = false;
        let isStopped = false;
        let bounds = {};

        function updateBounds() {
            const aspect = window.innerWidth / window.innerHeight;
            bounds = { r: (d * aspect) - 0.5, l: (-d * aspect) + 0.5, t: d - 0.5, b: -d + 0.5 };
        }
        updateBounds();

        // --- 5. Button Logic ---
        document.getElementById('stopBtn').addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent drag triggering on click
            isStopped = true;
            isDragging = false;
            
            // Reset position to center
            px = 0; py = 0;
            vx = 0; vy = 0;
            rx = 0; ry = 0;

            // Reset rotation to show face "5" (the +z face in our array)
            dice.rotation.set(0, 0, 0);
        });

        // --- 6. Interaction ---
        function getMouseWorldPos(e) {
            const x = (e.clientX / window.innerWidth) * 2 - 1;
            const y = -(e.clientY / window.innerHeight) * 2 + 1;
            return new THREE.Vector3(x, y, 0).unproject(camera);
        }

        window.addEventListener('pointerdown', () => { 
            isStopped = false; // Resume physics on click
            isDragging = true; 
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const worldPos = getMouseWorldPos(e);
            vx = (worldPos.x - dice.position.x) * 0.5;
            vy = (worldPos.y - dice.position.y) * 0.5;
            px = worldPos.x; py = worldPos.y;
            rx = vy * 0.5; ry = vx * 0.5;
        });

        window.addEventListener('pointerup', () => { isDragging = false; });

        // --- 7. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isStopped) {
                if (!isDragging) {
                    vy += gravity;
                    px += vx; py += vy;

                    if (px > bounds.r || px < bounds.l) { vx *= -bounce; px = Math.max(bounds.l, Math.min(px, bounds.r)); }
                    if (py > bounds.t || py < bounds.b) { vy *= -bounce; py = Math.max(bounds.b, Math.min(py, bounds.t)); }
                }

                dice.position.set(px, py, 0);
                dice.rotation.x += rx;
                dice.rotation.y += ry;
            } else {
                // If stopped, keep it exactly at center
                dice.position.set(0, 0, 0);
            }

            // Snow
            const p = snowPoints.geometry.attributes.position.array;
            for (let i = 1; i < p.length; i += 3) {
                p[i] -= 0.02; if (p[i] < -5) p[i] = 5;
            }
            snowPoints.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect; camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateBounds();
        });

        animate();
    </script>
</body>
</html>
