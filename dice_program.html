<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowy Bouncing Dice</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        /* CSS Gradient for the Sky */
        body {
            background: linear-gradient(to bottom, #1e3c72 0%, #2a5298 100%);
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. Scene & Camera ---
        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const d = 5; 
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- 3. The Floor (Light Blue) ---
        const floorGeo = new THREE.PlaneGeometry(20, 2);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0xadd8e6 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -4.5; // Placed at the bottom
        scene.add(floor);

        // --- 4. The Snow Particles ---
        const snowCount = 1000;
        const snowGeo = new THREE.BufferGeometry();
        const snowPos = new Float32Array(snowCount * 3);

        for (let i = 0; i < snowCount * 3; i += 3) {
            snowPos[i] = (Math.random() - 0.5) * 20;  // X
            snowPos[i+1] = (Math.random() - 0.5) * 10; // Y
            snowPos[i+2] = (Math.random() - 0.5) * 10; // Z
        }
        snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
        const snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
        const snowPoints = new THREE.Points(snowGeo, snowMat);
        scene.add(snowPoints);

        // --- 5. The Dice ---
        function createDiceFace(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 128, 128);
            ctx.strokeStyle = '#2a5298'; ctx.lineWidth = 10; ctx.strokeRect(0, 0, 128, 128);
            ctx.fillStyle = '#2a5298'; ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(number, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        const materials = [1, 2, 3, 4, 5, 6].map(n => new THREE.MeshLambertMaterial({ map: createDiceFace(n) }));
        const dice = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), materials);
        scene.add(dice);

        // --- 6. Physics Logic ---
        let px = 0, py = 0, vx = 0.08, vy = 0.1;
        const gravity = -0.004;
        const bounce = 0.95;
        let bounds = {};

        function updateBounds() {
            const aspect = window.innerWidth / window.innerHeight;
            bounds = { r: d * aspect - 0.5, l: -d * aspect + 0.5, t: d - 0.5, b: -d + 0.5 };
        }
        updateBounds();

        // --- 7. Animation ---
        function animate() {
            requestAnimationFrame(animate);

            // Dice Physics
            vy += gravity;
            px += vx; py += vy;

            if (px > bounds.r || px < bounds.l) { vx *= -bounce; px = Math.max(bounds.l, Math.min(px, bounds.r)); }
            if (py > bounds.t) { py = bounds.t; vy *= -bounce; }
            if (py < bounds.b) { py = bounds.b; vy *= -bounce; }

            dice.position.set(px, py, 0);
            dice.rotation.x += 0.02; dice.rotation.y += 0.02;

            // Snow Animation
            const positions = snowPoints.geometry.attributes.position.array;
            for (let i = 1; i < positions.length; i += 3) {
                positions[i] -= 0.02; // Move down
                if (positions[i] < -5) positions[i] = 5; // Reset to top
            }
            snowPoints.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect; camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateBounds();
            floor.scale.x = aspect * 5; 
        });

        animate();
    </script>
</body>
</html>
