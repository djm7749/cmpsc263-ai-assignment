<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Snake</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }
        h1 { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Score: <span id="score">0</span></h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;
        
        // Snake body (array of coordinates)
        let snake = [
            {x: 10, y: 10}, 
            {x: 10, y: 11}, 
            {x: 10, y: 12}
        ];

        let foodX = 5;
        let foodY = 5;

        // Main Game Loop
        function drawGame() {
            updateSnakePosition();
            
            if (checkGameOver()) {
                alert("Game Over! Score: " + score);
                resetGame();
                return;
            }

            checkFoodCollision();
            clearScreen();
            drawFood();
            drawSnake();

            setTimeout(drawGame, 100); // 10 frames per second
        }

        function clearScreen() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "lime";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function updateSnakePosition() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Add new head
            snake.pop(); // Remove tail
        }

        function checkFoodCollision() {
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score++;
                scoreElement.innerHTML = score;
                // Grow snake by not popping the tail this frame
                snake.push({}); 
                moveFood();
            }
        }

        function moveFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
        }

        function drawFood() {
            ctx.fillStyle = "red";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize - 2, gridSize - 2);
        }

        function checkGameOver() {
            if (dx === 0 && dy === 0) return false; // Haven't started yet

            // Wall collisions
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            // Self collision
            let hitSelf = false;
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) hitSelf = true;
            }

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall || hitSelf;
        }

        function resetGame() {
            score = 0;
            scoreElement.innerHTML = score;
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            dx = 0; dy = 0;
            moveFood();
            drawGame();
        }

        // Controls
        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp":    if (dy !== 1)  { dx = 0; dy = -1; } break;
                case "ArrowDown":  if (dy !== -1) { dx = 0; dy = 1;  } break;
                case "ArrowLeft":  if (dx !== 1)  { dx = -1; dy = 0; } break;
                case "ArrowRight": if (dx !== -1) { dx = 1; dy = 0;  } break;
            }
        });

        drawGame();
    </script>
</body>
</html>
