<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --grid-line: #1a1a2e;
    --snake-head: #00ff9f;
    --snake-body: #00cc7a;
    --snake-tail: #007a49;
    --food: #ff3c5f;
    --food-glow: rgba(255, 60, 95, 0.6);
    --score-color: #00ff9f;
    --accent: #ff3c5f;
    --text-dim: #3a4a5a;
    --text-mid: #7a9aaa;
    --border: #1e2e3e;
    --scanline: rgba(0, 255, 159, 0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--score-color);
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 99;
  }

  .wrapper {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }

  .sidebar {
    width: 160px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .title-block {
    text-align: center;
  }

  .title-block h1 {
    font-size: 28px;
    letter-spacing: 0.2em;
    color: var(--snake-head);
    text-shadow:
      0 0 10px var(--snake-head),
      0 0 30px rgba(0,255,159,0.4),
      0 0 60px rgba(0,255,159,0.1);
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.5; }
    99% { opacity: 1; }
  }

  .stat-box {
    border: 1px solid var(--border);
    padding: 14px;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  .stat-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--snake-head), transparent);
  }

  .stat-label {
    font-size: 6px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 18px;
    color: var(--score-color);
    text-shadow: 0 0 10px rgba(0,255,159,0.5);
  }

  .controls-box {
    border: 1px solid var(--border);
    padding: 14px;
    background: var(--panel);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-mid);
    line-height: 2.2;
  }

  .controls-box .key {
    display: inline-block;
    background: var(--grid-line);
    border: 1px solid var(--border);
    padding: 1px 5px;
    color: var(--snake-head);
    font-size: 8px;
    margin-right: 4px;
  }

  .speed-box {
    border: 1px solid var(--border);
    padding: 14px;
    background: var(--panel);
  }

  .speed-label {
    font-size: 6px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
    font-family: 'Share Tech Mono', monospace;
  }

  .speed-btns {
    display: flex;
    gap: 6px;
  }

  .speed-btn {
    flex: 1;
    background: var(--grid-line);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 6px 0;
    cursor: pointer;
    transition: all 0.15s;
  }

  .speed-btn:hover,
  .speed-btn.active {
    background: var(--snake-head);
    color: var(--bg);
    border-color: var(--snake-head);
    box-shadow: 0 0 10px rgba(0,255,159,0.4);
  }

  /* CANVAS AREA */
  .game-area {
    position: relative;
  }

  .canvas-frame {
    border: 2px solid var(--snake-head);
    box-shadow:
      0 0 0 1px var(--bg),
      0 0 20px rgba(0,255,159,0.2),
      0 0 60px rgba(0,255,159,0.05),
      inset 0 0 30px rgba(0,0,0,0.5);
    position: relative;
  }

  canvas {
    display: block;
    background: var(--panel);
  }

  /* OVERLAY */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 15, 0.92);
    z-index: 10;
    gap: 20px;
    backdrop-filter: blur(2px);
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: 14px;
    color: var(--snake-head);
    text-shadow: 0 0 20px rgba(0,255,159,0.8);
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 1.8;
  }

  .overlay-title.dead {
    color: var(--accent);
    text-shadow: 0 0 20px rgba(255,60,95,0.8);
  }

  .overlay-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-mid);
  }

  .overlay-score span {
    color: var(--score-color);
  }

  .start-btn {
    background: transparent;
    border: 2px solid var(--snake-head);
    color: var(--snake-head);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 12px 28px;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--snake-head);
    transform: translateX(-100%);
    transition: transform 0.2s;
    z-index: -1;
  }

  .start-btn:hover {
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,255,159,0.5);
  }

  .start-btn:hover::before {
    transform: translateX(0);
  }

  /* progress bar strip at bottom */
  .progress-bar {
    height: 3px;
    background: var(--grid-line);
    position: relative;
    overflow: hidden;
    margin-top: 2px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--snake-tail), var(--snake-head));
    transition: width 0.3s;
    box-shadow: 0 0 8px var(--snake-head);
  }

  .level-badge {
    font-size: 6px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    margin-top: 4px;
    text-align: center;
    letter-spacing: 0.2em;
  }

</style>
</head>
<body>

<div class="noise"></div>

<div class="wrapper">
  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="title-block">
      <h1>SNAKE</h1>
    </div>

    <div class="stat-box">
      <div class="stat-label">// SCORE</div>
      <div class="stat-value" id="score">0000</div>
    </div>

    <div class="stat-box">
      <div class="stat-label">// HI-SCORE</div>
      <div class="stat-value" id="hiscore">0000</div>
    </div>

    <div class="stat-box">
      <div class="stat-label">// LENGTH</div>
      <div class="stat-value" id="length">001</div>
      <div class="progress-bar" style="margin-top:10px">
        <div class="progress-fill" id="lengthBar" style="width:5%"></div>
      </div>
      <div class="level-badge" id="levelBadge">LVL 01</div>
    </div>

    <div class="speed-box">
      <div class="speed-label">// SPEED</div>
      <div class="speed-btns">
        <button class="speed-btn active" id="s1" onclick="setSpeed(1)">01</button>
        <button class="speed-btn" id="s2" onclick="setSpeed(2)">02</button>
        <button class="speed-btn" id="s3" onclick="setSpeed(3)">03</button>
      </div>
    </div>

    <div class="controls-box">
      <div><span class="key">W</span>UP</div>
      <div><span class="key">S</span>DOWN</div>
      <div><span class="key">A</span>LEFT</div>
      <div><span class="key">D</span>RIGHT</div>
      <div style="margin-top:8px"><span class="key">P</span>PAUSE</div>
    </div>
  </div>

  <!-- GAME CANVAS -->
  <div class="game-area">
    <div class="canvas-frame">
      <canvas id="gameCanvas" width="420" height="420"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlayTitle">PRESS START<br>TO PLAY</div>
        <div class="overlay-score hidden" id="overlayScore">SCORE: <span id="finalScore">0</span></div>
        <button class="start-btn" id="startBtn" onclick="startGame()">START</button>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRID = 21;
const CELL = canvas.width / GRID;

let snake, dir, nextDir, food, score, hiScore, running, paused, gameLoop, speedLevel;
let particles = [];

const SPEEDS = { 1: 130, 2: 90, 3: 55 };
speedLevel = 1;

function initState() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  placeFood();
  particles = [];
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * GRID),
      y: Math.floor(Math.random() * GRID)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function startGame() {
  hiScore = parseInt(document.getElementById('hiscore').textContent) || 0;
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('overlayScore').classList.add('hidden');
  initState();
  running = true;
  paused = false;
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, SPEEDS[speedLevel]);
  updateUI();
}

function tick() {
  if (!running || paused) return;
  dir = { ...nextDir };

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    endGame(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 + (speedLevel - 1) * 5;
    spawnParticles(food.x, food.y);
    placeFood();
  } else {
    snake.pop();
  }

  updateUI();
  draw();
}

function endGame() {
  running = false;
  clearInterval(gameLoop);
  if (score > hiScore) hiScore = score;
  document.getElementById('hiscore').textContent = String(hiScore).padStart(4, '0');
  document.getElementById('finalScore').textContent = score;
  document.getElementById('overlayTitle').textContent = 'GAME OVER';
  document.getElementById('overlayTitle').className = 'overlay-title dead';
  document.getElementById('overlayScore').classList.remove('hidden');
  document.getElementById('startBtn').textContent = 'RETRY';
  document.getElementById('overlay').classList.remove('hidden');
}

function updateUI() {
  document.getElementById('score').textContent = String(score).padStart(4, '0');
  document.getElementById('hiscore').textContent = String(Math.max(score, hiScore)).padStart(4, '0');
  const len = snake.length;
  document.getElementById('length').textContent = String(len).padStart(3, '0');
  const lvl = Math.min(Math.floor(len / 5) + 1, 99);
  document.getElementById('levelBadge').textContent = `LVL ${String(lvl).padStart(2,'0')}`;
  const pct = Math.min((len / 50) * 100, 100);
  document.getElementById('lengthBar').style.width = pct + '%';
}

// PARTICLES
function spawnParticles(gx, gy) {
  const cx = gx * CELL + CELL / 2;
  const cy = gy * CELL + CELL / 2;
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 2.5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: 0.06 + Math.random() * 0.04,
      size: 2 + Math.random() * 2
    });
  }
}

// DRAW
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#141428';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(canvas.width, i * CELL);
    ctx.stroke();
  }

  // Food glow
  const now = Date.now();
  const pulse = 0.5 + 0.5 * Math.sin(now / 300);
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL * (1 + pulse * 0.5));
  grad.addColorStop(0, 'rgba(255,60,95,0.25)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(fx, fy, CELL * (1.2 + pulse * 0.3), 0, Math.PI * 2);
  ctx.fill();

  // Food
  const fs = CELL * 0.55;
  ctx.fillStyle = '#ff3c5f';
  ctx.shadowColor = '#ff3c5f';
  ctx.shadowBlur = 8 + pulse * 6;
  ctx.fillRect(food.x * CELL + (CELL - fs) / 2, food.y * CELL + (CELL - fs) / 2, fs, fs);
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const t = i / (snake.length - 1 || 1);
    const r = Math.round(0 + t * 0);
    const g = Math.round(255 - t * 130);
    const b = Math.round(159 - t * 100);
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    const pad = i === 0 ? 1 : 2 + t * 2;
    const x = seg.x * CELL + pad;
    const y = seg.y * CELL + pad;
    const sz = CELL - pad * 2;

    if (i === 0) {
      ctx.shadowColor = 'rgba(0,255,159,0.7)';
      ctx.shadowBlur = 12;
    } else {
      ctx.shadowBlur = 0;
    }

    ctx.fillRect(x, y, sz, sz);

    // Head eyes
    if (i === 0) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#0a0a0f';
      const ex = 3, ey = 3;
      // Position eyes based on direction
      let e1x, e1y, e2x, e2y;
      const cx2 = seg.x * CELL + CELL / 2;
      const cy2 = seg.y * CELL + CELL / 2;
      if (dir.x === 1)  { e1x = cx2+3; e1y = cy2-3; e2x = cx2+3; e2y = cy2+3; }
      else if (dir.x === -1) { e1x = cx2-3; e1y = cy2-3; e2x = cx2-3; e2y = cy2+3; }
      else if (dir.y === -1) { e1x = cx2-3; e1y = cy2-3; e2x = cx2+3; e2y = cy2-3; }
      else              { e1x = cx2-3; e1y = cy2+3; e2x = cx2+3; e2y = cy2+3; }
      ctx.beginPath(); ctx.arc(e1x, e1y, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x, e2y, 1.5, 0, Math.PI*2); ctx.fill();
    }
  });

  ctx.shadowBlur = 0;

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#ff3c5f';
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    p.vx *= 0.95; p.vy *= 0.95;
  });
  ctx.globalAlpha = 1;

  if (running && !paused) requestAnimationFrame(() => { if(running && !paused) draw(); });
}

// CONTROLS
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: { x:0, y:-1 }, w: { x:0, y:-1 }, W: { x:0, y:-1 },
    ArrowDown: { x:0, y:1 }, s: { x:0, y:1 }, S: { x:0, y:1 },
    ArrowLeft: { x:-1, y:0 }, a: { x:-1, y:0 }, A: { x:-1, y:0 },
    ArrowRight: { x:1, y:0 }, d: { x:1, y:0 }, D: { x:1, y:0 },
  };
  const nd = map[e.key];
  if (nd) {
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    e.preventDefault();
  }
  if (e.key === 'p' || e.key === 'P') togglePause();
});

function togglePause() {
  if (!running) return;
  paused = !paused;
  if (!paused) {
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, SPEEDS[speedLevel]);
    draw();
  }
}

function setSpeed(lvl) {
  speedLevel = lvl;
  [1,2,3].forEach(i => {
    document.getElementById('s'+i).classList.toggle('active', i === lvl);
  });
  if (running && !paused) {
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, SPEEDS[speedLevel]);
  }
}

// TOUCH SUPPORT
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    const nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    if (nd.x !== -dir.x) nextDir = nd;
  } else {
    const nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    if (nd.y !== -dir.y) nextDir = nd;
  }
  touchStart = null;
}, { passive: true });

// Initial draw
(function idleDraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#141428';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
  }
})();
</script>
</body>
</html>
